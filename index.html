<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Tracker</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:400px;
    text-align:center;
    border:1px solid #333;
}

h1{
    color:#60a5fa;
}

.small{
    color:#888;
    font-size:14px;
}

.price-box{
    background:#020817;
    padding:25px;
    border-radius:15px;
    margin:20px 0;
    border:1px dashed #333;
}

#rate{
    font-size:55px;
    color:#22c55e;
    font-weight:bold;
}

select{
    width:100%;
    padding:12px;
    background:#1f2937;
    color:white;
    border-radius:8px;
    border:1px solid #444;
    margin-top:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2ea043;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#36c157;
}

</style>
</head>

<body>

<div class="card">

<h1>Forex Tracker</h1>

<p class="small">
BASE CURRENCY: 1 INR
</p>

<div class="price-box">

<p class="small">TARGET RATE</p>

<div id="rate">0.00</div>

<p id="currencyName">
Loading...
</p>

</div>

<select id="currencySelect" onchange="updateUI()">

<option value="USD">US Dollar (USD)</option>

<option value="EUR">Euro (EUR)</option>

<option value="GBP">British Pound (GBP)</option>

<option value="JPY">Japanese Yen (JPY)</option>

<option value="AED">UAE Dirham (AED)</option>

<option value="CNY">Chinese Yuan (CNY)</option>

</select>

<button onclick="fetchRate()">
Update Live Rate
</button>

<p class="small" style="margin-top:15px;">
Data provided by Open Exchange API
</p>

</div>

<script>

let globalRates = {};

async function fetchRate(){

    try{

        const response =
        await fetch("https://open.er-api.com/v6/latest/USD");

        const data = await response.json();

        globalRates = data.rates;

        updateUI();

    }

    catch(error){

        alert("Error fetching exchange rates");

    }

}

function updateUI(){

    const currency =
    document.getElementById("currencySelect").value;

    const usdToInr =
    globalRates["INR"];

    const usdToTarget =
    globalRates[currency];

    const inrToTarget =
    usdToTarget / usdToInr;

    document.getElementById("rate").innerText =
    inrToTarget.toFixed(4);

    document.getElementById("currencyName").innerText =
    `1 INR = ${inrToTarget.toFixed(4)} ${currency}`;

}

fetchRate();

</script>

</body>
</html>
