<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Currency Pulse</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #161b22; padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; margin-bottom: 10px; font-size: 1.8rem; }
        .price-box { background: #0d1117; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px dashed #30363d; }
        #rate { font-size: 3rem; font-weight: bold; color: #238636; margin: 0; }
        select, input { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; outline: none; }
        .label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .btn { background: #238636; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Forex Tracker</h1>
        <p class="label">Base Currency: 1 USD</p>
        
        <div class="price-box">
            <p class="label">Target Rate</p>
            <div id="rate">0.00</div>
            <p id="currencyName" style="margin: 5px 0 0 0; color: #8b949e;">Select Currency</p>
        </div>

        <select id="currencySelect">
            <option value="INR">Indian Rupee (INR)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="GBP">British Pound (GBP)</option>
            <option value="JPY">Japanese Yen (JPY)</option>
            <option value="CAD">Canadian Dollar (CAD)</option>
            <option value="AED">UAE Dirham (AED)</option>
        </select>

        <button class="btn" onclick="fetchRate()">Update Live Rate</button>
        <p style="font-size: 0.7rem; color: #484f58; margin-top: 15px;">Data provided by Open Exchange API</p>
    </div>

    <script>
        async function fetchRate() {
            const currency = document.getElementById('currencySelect').value;
            const rateDisplay = document.getElementById('rate');
            const nameDisplay = document.getElementById('currencyName');
            
            rateDisplay.innerText = "...";
            
            try {
                // Free API for exchange rates
                const response = await fetch(`https://open.er-api.com/v6/latest/USD`);
                const data = await response.json();
                
                const liveRate = data.rates[currency];
                rateDisplay.innerText = liveRate.toFixed(2);
                nameDisplay.innerText = `1 USD = ${liveRate.toFixed(2)} ${currency}`;
            } catch (error) {
                rateDisplay.innerText = "Error";
                alert("Could not fetch data. Check your internet.");
            }
        }

        // Run once on load
        fetchRate();
    </script>
</body>
</html>
